<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}StockBot AI Pro{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300E5FF' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='22 7 13.5 15.5 8.5 10.5 2 17'></polyline><polyline points='16 7 22 7 22 13'></polyline></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            glass: 'rgba(15, 23, 42, 0.4)',
            accent: '#00E5FF',
            success: '#00E676',
            warning: '#FFEA00',
            danger: '#FF1744',
            muted: '#94A3B8'
          },
          animation: {
            'blob': 'blob 7s infinite',
            'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .glass-panel {
        @apply bg-glass backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl transition duration-500 hover:border-white/30 hover:-translate-y-1;
      }
      .text-gradient {
        @apply bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-600;
      }
      .pill-btn {
        @apply bg-white/5 border border-white/10 rounded-full px-5 py-2 text-sm font-semibold text-muted transition hover:bg-white/10 hover:text-white hover:border-white/30;
      }
    }
    body {
      background-color: #020617; /* Slate 950 */
      color: #F8FAFC; /* Slate 50 */
    }
    /* Target the ThreeJS Canvas */
    #three-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -10;
      pointer-events: none; /* Let clicks pass through to UI */
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }
    .stagger-1 { animation-delay: 100ms; }
    .stagger-2 { animation-delay: 200ms; }
    .stagger-3 { animation-delay: 300ms; }
    .stagger-4 { animation-delay: 400ms; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body class="antialiased min-h-screen flex flex-col relative overflow-x-hidden">
  <canvas id="three-canvas"></canvas>
  <div class="fixed top-0 left-1/4 w-96 h-96 bg-cyan-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob -z-10 pointer-events-none"></div>
  <div class="fixed top-1/4 right-1/4 w-96 h-96 bg-blue-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000 -z-10 pointer-events-none"></div>
  <div class="fixed -bottom-32 left-1/3 w-96 h-96 bg-purple-500/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob animation-delay-4000 -z-10 pointer-events-none"></div>
  <nav class="sticky top-0 z-50 bg-slate-950/50 backdrop-blur-2xl border-b border-white/10 py-4">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center">
      <a href="/" class="flex items-center gap-3 no-underline group">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-white shadow-lg shadow-cyan-500/30 group-hover:shadow-cyan-500/50 transition duration-300">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
        </div>
        <div>
          <h1 class="font-display font-bold text-xl tracking-tight leading-none text-white m-0">StockBot</h1>
          <p class="text-[10px] font-bold tracking-widest text-cyan-400 uppercase mt-0.5 m-0 block">AI Vision Pro</p>
        </div>
      </a>
      <div class="flex flex-col items-end">
        <div class="flex items-center gap-2 text-xs font-bold text-success tracking-wide uppercase">
          <span class="w-2 h-2 rounded-full bg-success animate-pulse shadow-[0_0_8px_theme('colors.success')]"></span>
          Live Feed Active
        </div>
      </div>
    </div>
  </nav>
  <main class="flex-grow max-w-[1400px] mx-auto w-full px-6 lg:px-8 pt-12 pb-24 z-10">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-t border-white/10 py-8 mt-auto z-10 bg-slate-950/30 backdrop-blur-md flex justify-center">
    <div class="tracking-wide text-center text-xs text-slate-400 font-medium">
      &copy; 2026 <strong>StockBot AI Pro</strong> &nbsp;|&nbsp; Architected and Developed by <strong class="text-white">Pratik Mishra</strong>.
    </div>
  </footer>
  <script>
    const canvas = document.getElementById('three-canvas');
    const scene = new THREE.Scene();
    // Add atmospheric fog
    scene.fog = new THREE.FogExp2(0x020617, 0.0015);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    // Particle Geometry (Data Nodes)
    const particleCount = 1000;
    const geometry = new THREE.BufferGeometry();
    const posArray = new Float32Array(particleCount * 3);
    // Randomly place particles in a wide 3D space
    for(let i = 0; i < particleCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 800; // Spread x, y, z
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    // Make particles look like glowing cyan/blue data points
    // Use a custom texture for perfect circles or just raw points for speed
    const material = new THREE.PointsMaterial({
        size: 2,
        color: 0x00E5FF,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending
    });
    const particlesMesh = new THREE.Points(geometry, material);
    scene.add(particlesMesh);
    // Subtle Grid/Lines to look like a financial matrix
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.03 });
    const gridHelper = new THREE.GridHelper(1000, 40, null, 0xffffff);
    gridHelper.position.y = -150;
    scene.add(gridHelper);
    camera.position.z = 200;
    // Mouse Interaction
    let mouseX = 0;
    let mouseY = 0;
    let targetX = 0;
    let targetY = 0;
    const windowHalfX = window.innerWidth / 2;
    const windowHalfY = window.innerHeight / 2;
    document.addEventListener('mousemove', (event) => {
        mouseX = (event.clientX - windowHalfX);
        mouseY = (event.clientY - windowHalfY);
    });
    const clock = new THREE.Clock();
    // Animation Loop
    function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();
        // Slow rotation of the entire particle mesh
        particlesMesh.rotation.y = elapsedTime * 0.05;
        particlesMesh.rotation.x = elapsedTime * 0.02;
        // Gentle undulating wave effect on Y axis
        gridHelper.position.y = -150 + Math.sin(elapsedTime) * 10;
        // Easing mouse movement into camera movement for parallax
        targetX = mouseX * 0.05;
        targetY = mouseY * 0.05;
        camera.position.x += (targetX - camera.position.x) * 0.02;
        camera.position.y += (-targetY - camera.position.y) * 0.02;
        camera.lookAt(scene.position);
        renderer.render(scene, camera);
    }
    animate();
    // Responsive Canvas
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
